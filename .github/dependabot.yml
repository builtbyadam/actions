version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/actions/matrix-shrinker"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @actions/core >=3 and @actions/github >=9 are ESM-only and break
      # CJS + ncc bundling (see docs/CONVENTIONS.md). Majors stay manual.
      - dependency-name: "@actions/core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@actions/github"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
