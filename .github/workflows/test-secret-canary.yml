name: test-secret-canary

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "actions/secret-canary/**"
      - ".github/workflows/test-secret-canary.yml"
  push:
    branches: [main]
    paths:
      - "actions/secret-canary/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - working-directory: actions/secret-canary
        run: node --test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Scan this repo's clean checkout: no secrets expected.
      - id: scan
        uses: ./actions/secret-canary
        with:
          comment-on-pr: "false"
          fail-on-findings: "true"

      - name: Assert clean scan
        env:
          FINDINGS_COUNT: ${{ steps.scan.outputs.findings-count }}
          REPORT: ${{ steps.scan.outputs.report }}
        run: |
          node -e '
            const assert = require("node:assert");
            assert.strictEqual(process.env.FINDINGS_COUNT, "0", "expected zero findings");
            assert.strictEqual(process.env.REPORT, "[]", "expected an empty report");
            console.log("OK: clean scan, findings-count=0, report=[]");
          '
