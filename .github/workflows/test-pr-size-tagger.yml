name: test-pr-size-tagger

on:
  pull_request:
    paths:
      - "actions/pr-size-tagger/**"
      - ".github/workflows/test-pr-size-tagger.yml"
  push:
    branches: [main]
    paths:
      - "actions/pr-size-tagger/**"

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - working-directory: actions/pr-size-tagger
        run: |
          npm ci
          npm test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: tag
        uses: ./actions/pr-size-tagger

      - name: Assert outputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABEL: ${{ steps.tag.outputs.label }}
          LINES: ${{ steps.tag.outputs.lines }}
          OVER: ${{ steps.tag.outputs.over-threshold }}
        run: |
          node -e '
            const assert = require("node:assert");
            const { EVENT_NAME, LABEL, LINES, OVER } = process.env;
            const binKeys = ["size/XS", "size/S", "size/M", "size/L", "size/XL"];
            if (EVENT_NAME === "push") {
              assert.strictEqual(LABEL, "", `expected empty label on push, got "${LABEL}"`);
              assert.strictEqual(LINES, "0", `expected lines "0" on push, got "${LINES}"`);
              assert.strictEqual(OVER, "false", `expected over-threshold "false", got "${OVER}"`);
              console.log("OK: push no-op contract held");
            } else {
              assert.match(LABEL, /^size\//, `expected a size/ label, got "${LABEL}"`);
              assert.ok(binKeys.includes(LABEL), `label "${LABEL}" not a default bin key`);
              assert.ok(Number(LINES) > 0, `expected lines > 0, got "${LINES}"`);
              console.log(`OK: PR labelled ${LABEL} (${LINES} lines)`);
            }
          '
